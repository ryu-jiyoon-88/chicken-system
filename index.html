<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>치킨파머스 분석 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; background: #f4f6f9; font-family: 'Malgun Gothic', sans-serif; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #ff7e00; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .header { background: #fff; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn { background: #ff7e00; color: #fff; padding: 12px 25px; border-radius: 8px; cursor: pointer; border: none; font-weight: bold; }
        .dashboard { max-width: 1100px; margin: 25px auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 20px; display: none; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.03); }
        h3 { font-size: 1.05em; border-left: 5px solid #ff7e00; padding-left: 12px; margin-bottom: 15px; color: #2c3e50; }
        canvas { width: 100% !important; height: 300px !important; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div style="margin-top:20px; color:#ff7e00; font-weight:bold; font-size:1.4em;">준비 완료까지 <span id="timer">3</span>초 남음</div>
    </div>

    <div class="header">
        <h2 style="margin:0; font-size:1.4em;">🍗 치킨파머스 분석 대시보드</h2>
        <input type="file" id="upload" style="display:none;" accept=".xlsx">
        <button class="btn" onclick="document.getElementById('upload').click()">엑셀 업로드</button>
    </div>

    <div id="dashboard" class="dashboard">
        <div class="card"><h3>📦 수익 기여 TOP 5</h3><canvas id="chart1"></canvas></div>
        <div class="card"><h3>🥧 PB / NB 매출 비중</h3><canvas id="chart2"></canvas></div>
        <div class="card"><h3>🏠 매장별 발주 순위</h3><canvas id="chart3"></canvas></div>
        <div class="card"><h3>💰 카테고리별 마진율</h3><canvas id="chart4"></canvas></div>
    </div>

    <script>
        // 1. 카운트다운 로직 (딱 3초만 보여주고 바로 시작)
        let timeLeft = 3;
        const timer = document.getElementById('timer');
        const countdown = setInterval(() => {
            timeLeft--;
            timer.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }, 1000);

        // 2. 엑셀 분석 로직
        document.getElementById('upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(sheet);

                processData(json);
            };
            reader.readAsArrayBuffer(file);
        });

        function processData(data) {
            // 수익 계산 및 데이터 가공
            const items = {};
            const types = { 'PB': 0, 'NB': 0 };
            const shops = {};

            data.forEach(row => {
                const price = parseFloat(row['판매가(부가세별도)']) || 0;
                const isPB = String(row['구분']).includes('PB');
                const profit = isPB ? price * 0.174 : price * 0.03;
                const name = row['품목명'] || '알 수 없음';
                const shop = row['가맹점명'] || '기타 매장';

                items[name] = (items[name] || 0) + profit;
                types[isPB ? 'PB' : 'NB'] += price;
                shops[shop] = (shops[shop] || 0) + price;
            });

            document.getElementById('dashboard').style.display = 'grid';
            renderCharts(items, types, shops);
        }

        let charts = [];
        function renderCharts(items, types, shops) {
            // 기존 차트가 있으면 삭제
            charts.forEach(c => c.destroy());

            const ctx1 = document.getElementById('chart1').getContext('2d');
            const top5 = Object.entries(items).sort((a,b) => b[1]-a[1]).slice(0,5);
            charts.push(new Chart(ctx1, {
                type: 'doughnut',
                data: { labels: top5.map(x=>x[0]), datasets: [{ data: top5.map(x=>x[1]), backgroundColor: ['#ff7e00','#ff9f40','#ffcd56','#4bc0c0','#36a2eb'] }] }
            }));

            const ctx2 = document.getElementById('chart2').getContext('2d');
            charts.push(new Chart(ctx2, {
                type: 'pie',
                data: { labels: ['PB 상품', 'NB 상품'], datasets: [{ data: [types['PB'], types['NB']], backgroundColor: ['#ff7e00','#99aab5'] }] }
            }));

            const ctx3 = document.getElementById('chart3').getContext('2d');
            const topShops = Object.entries(shops).sort((a,b) => b[1]-a[1]).slice(0,5);
            charts.push(new Chart(ctx3, {
                type: 'bar',
                data: { labels: topShops.map(x=>x[0]), datasets: [{ label: '발주금액', data: topShops.map(x=>x[1]), backgroundColor: '#ff7e00' }] },
                options: { indexAxis: 'y' }
            }));

            const ctx4 = document.getElementById('chart4').getContext('2d');
            charts.push(new Chart(ctx4, {
                type: 'bar',
                data: { labels: ['PB 마진율', 'NB 마진율'], datasets: [{ label: '마진율(%)', data: [17.4, 3.0], backgroundColor: ['#ff7e00','#2ecc71'] }] }
            }));
        }
    </script>
</body>
</html>
